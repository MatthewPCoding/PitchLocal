version: "3.9"

services:
  backend:
    build: ./backend
    container_name: pitchlocal_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: pitchlocal_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

  db:
    image: postgres:15-alpine
    container_name: pitchlocal_db
    environment:
      - POSTGRES_USER=pitchlocal
      - POSTGRES_PASSWORD=pitchlocal
      - POSTGRES_DB=pitchlocal
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
